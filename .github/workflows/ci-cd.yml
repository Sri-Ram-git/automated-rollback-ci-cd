name: CI/CD with Rollback

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🐳 Build Image
      - name: Build Docker Image
        run: docker build -t rollback-app:latest .

      # ✅ Save Stable (important for rollback)
      - name: Save Stable Version
        run: docker tag rollback-app:latest rollback-app:stable

      # 🔥 Change to Version 2 (simulate new release)
      - name: Set Version 2
        run: |
          sed -i 's/Version 1 - Working/Version 2 - Broken/g' docker-compose.yml

      # 🚀 Deploy
      - name: Deploy App
        run: |
          docker compose down || true
          docker compose up -d
          sleep 10

      # 👀 Show current version
      - name: Show App Response
        run: curl http://localhost:3000

      # 💥 Health Check (force failure)
      - name: Health Check
        run: curl --fail http://localhost:3000/crash
        

      # 🔁 Rollback
      - name: Rollback on Failure
        if: failure()
        run: |
          echo "Rollback triggered..."
          docker compose down || true
          docker tag rollback-app:stable rollback-app:latest
          docker compose up -d
          sleep 5

      # 🔍 Verify rollback (MOST IMPORTANT)
      - name: Verify Rollback
        if: failure()
        run: curl http://localhost:3000